name: Publish to npm

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    # CI-gated channels. The head branch of the completed CI run selects the
    # channel: release/** -> stable (GA), develop -> beta (integration preview).
    # A PR targeting develop carries the PR's source branch as head_branch, not
    # literally 'develop', so this filter fires only on real pushes/merges.
    branches: ['release/**', 'develop']
  schedule:
    - cron: '0 2 * * 1-5' # Weekdays at 2 AM UTC (Mon-Fri) — nightly
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (ignored for CI-gated workflow_run — branch decides: release/**=stable, develop=beta)'
        required: true
        default: 'nightly'
        type: choice
        options:
          - nightly
          - beta
          - rc
          - stable

env:
  SFCC_DISABLE_TELEMETRY: ${{ vars.SFCC_DISABLE_TELEMETRY }}

# Least-privilege default for every job; each job opts up to only what it needs.
permissions:
  contents: read

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    outputs:
      release_type: ${{ steps.release-type.outputs.type }}
      publish_vsx: ${{ steps.packages.outputs.publish_vsx }}
      version_vsx: ${{ steps.packages.outputs.version_vsx }}
      # Per-package publish decisions, consumed by the environment-gated
      # publish-npm-rc job so the rc npm push mirrors exactly what this job
      # resolved (single source of truth for "what changed this cycle").
      publish_sdk: ${{ steps.packages.outputs.publish_sdk }}
      publish_cli: ${{ steps.packages.outputs.publish_cli }}
      publish_mcp: ${{ steps.packages.outputs.publish_mcp }}
      publish_mrt: ${{ steps.packages.outputs.publish_mrt }}
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      actions: write # For triggering deploy-docs.yml via workflow_dispatch
      contents: write # For creating GitHub releases and tags
      id-token: write # Required for npm OIDC trusted publishers AND SLSA build provenance
      attestations: write # For actions/attest-build-provenance on the VSIX
      pull-requests: write # For creating merge-back PRs
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || '' }}
          fetch-depth: 0 # Needed for docs tag detection

      - name: Determine release type
        id: release-type
        env:
          # Bind untrusted workflow_dispatch input to an env var; do not interpolate
          # it into the shell. The 'choice' type is a UI hint only — API-driven
          # dispatches can send an arbitrary string, and this job holds id-token/
          # attestations/contents write (it is the SLSA signer), so an injection
          # here would let an attacker forge provenance.
          RELEASE_TYPE_INPUT: ${{ github.event.inputs.release_type }}
          # Also bound (not interpolated) for the same reason: the head branch of
          # the CI run that triggered us decides the CI-gated channel.
          WORKFLOW_RUN_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          # Resolve the channel into TYPE (stable|rc|beta|nightly) and npm dist-TAG.
          if [[ "$GITHUB_EVENT_NAME" == "workflow_run" ]]; then
            # CI-gated: the branch that passed CI selects the channel.
            case "$WORKFLOW_RUN_BRANCH" in
              develop)
                TYPE=beta;   TAG=beta ;;
              *)
                # release/** (and any other CI-gated branch) publishes stable.
                TYPE=stable; TAG=latest ;;
            esac
          elif [[ "$RELEASE_TYPE_INPUT" == "stable" ]]; then
            TYPE=stable; TAG=latest
          elif [[ "$RELEASE_TYPE_INPUT" == "rc" ]]; then
            # rc is dispatched by changesets.yml when the version PR merges to
            # main: package.json already carries the REAL target versions. rc
            # publishes those to npm under the 'rc' dist-tag and cuts ONE
            # prerelease GitHub release carrying every artifact; promotion later
            # moves the tag rc -> latest (build-once, no republish).
            TYPE=rc;     TAG=rc
          elif [[ "$RELEASE_TYPE_INPUT" == "beta" ]]; then
            TYPE=beta;   TAG=beta
          else
            TYPE=nightly; TAG=nightly
          fi

          # Two release families:
          #  - Snapshot (nightly, beta): ephemeral Changesets --snapshot previews,
          #    gated on pending changesets, published under their own dist-tag,
          #    cutting NO git tags or GitHub releases.
          #  - Real (rc, stable): consume the (already-applied) changeset version
          #    bump, publish real versions, and cut git tags + a GitHub release.
          #    rc and stable share the whole build/determine path; they diverge
          #    only in dist-tag, prerelease flag, and where npm publish runs.
          if [[ "$TYPE" == "stable" || "$TYPE" == "rc" ]]; then
            SNAPSHOT=false
          else
            SNAPSHOT=true
          fi

          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "snapshot=$SNAPSHOT" >> $GITHUB_OUTPUT
          echo "::notice::channel: type=$TYPE dist-tag=$TAG snapshot=$SNAPSHOT"

      # rc and stable both consume the (already-applied) changeset bump, so both
      # gate on 'no pending changesets left'. snapshot=='false' == (stable || rc).
      - name: Check for pending changesets
        if: steps.release-type.outputs.snapshot == 'false'
        id: changesets
        run: |
          PENDING=$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null | wc -l | tr -d ' ')
          if [[ "$PENDING" -gt 0 ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::notice::Found $PENDING pending changeset(s) — skipping publish"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # Snapshot channels (nightly, beta) are the inverse of stable: a snapshot
      # is a PREVIEW of what the pending changesets will release next, so it only
      # makes sense when there ARE pending changesets. With none, `changeset
      # version --snapshot` would bump nothing and every publish would try to
      # re-push an already-released version (a hard npm failure), so we skip the
      # whole snapshot run instead.
      - name: Check for pending changesets (snapshot)
        if: steps.release-type.outputs.snapshot == 'true'
        id: snapshot-changesets
        env:
          CHANNEL: ${{ steps.release-type.outputs.type }}
        run: |
          PENDING=$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null | wc -l | tr -d ' ')
          if [[ "$PENDING" -gt 0 ]]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "::notice::$PENDING pending changeset(s) — building $CHANNEL preview"
          else
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::notice::No pending changesets — nothing new to preview, skipping $CHANNEL"
          fi

      - name: Quick version check
        if: steps.release-type.outputs.snapshot == 'false' && steps.changesets.outputs.skip != 'true'
        id: quick-check
        run: |
          HAS_CHANGES=false
          for spec in "@salesforce/b2c-tooling-sdk:packages/b2c-tooling-sdk" \
                      "@salesforce/b2c-cli:packages/b2c-cli" \
                      "@salesforce/b2c-dx-mcp:packages/b2c-dx-mcp" \
                      "@salesforce/mrt-utilities:packages/mrt-utilities"; do
            PKG_NAME="${spec%%:*}"
            PKG_PATH="${spec##*:}"
            LOCAL=$(node -p "require('./${PKG_PATH}/package.json').version")
            NPM=$(npm view "$PKG_NAME" version 2>/dev/null || echo "0.0.0")
            if [ "$LOCAL" != "$NPM" ]; then
              HAS_CHANGES=true
              break
            fi
          done
          # Also check VS extension tag
          if [ "$HAS_CHANGES" = "false" ]; then
            VSX_VERSION=$(node -p "require('./packages/b2c-vs-extension/package.json').version")
            LAST_VSX_TAG=$(git tag -l "b2c-vs-extension@*" --sort=-v:refname | grep -v '@latest$' | head -1 | sed 's/b2c-vs-extension@//')
            if [ "$VSX_VERSION" != "$LAST_VSX_TAG" ]; then
              HAS_CHANGES=true
            fi
          fi
          # Also check docs tag
          if [ "$HAS_CHANGES" = "false" ]; then
            DOCS_VERSION=$(node -p "require('./docs/package.json').version")
            if ! git rev-parse "docs@${DOCS_VERSION}" >/dev/null 2>&1; then
              HAS_CHANGES=true
            fi
          fi
          # Also check agent-plugins tag
          if [ "$HAS_CHANGES" = "false" ]; then
            PLUGINS_VERSION=$(node -p "require('./skills/package.json').version")
            if ! git rev-parse "b2c-agent-plugins@${PLUGINS_VERSION}" >/dev/null 2>&1; then
              HAS_CHANGES=true
            fi
          fi
          if [ "$HAS_CHANGES" = "false" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::notice::All package versions match npm — nothing to publish"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup pnpm
        if: (steps.release-type.outputs.snapshot == 'true' && steps.snapshot-changesets.outputs.skip != 'true') || (steps.changesets.outputs.skip != 'true' && steps.quick-check.outputs.skip != 'true')
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node.js
        if: (steps.release-type.outputs.snapshot == 'true' && steps.snapshot-changesets.outputs.skip != 'true') || (steps.changesets.outputs.skip != 'true' && steps.quick-check.outputs.skip != 'true')
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24.18.0'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        if: (steps.release-type.outputs.snapshot == 'true' && steps.snapshot-changesets.outputs.skip != 'true') || (steps.changesets.outputs.skip != 'true' && steps.quick-check.outputs.skip != 'true')
        # Pin to an exact, known-good npm. It must be >=11.5.1 (the OIDC
        # trusted-publishing minimum) but NOT npm@latest: npm@12.0.0's global
        # self-install is broken (prunes modules it needs, e.g. 'sigstore'),
        # and previously tripped EBADENGINE on Node 22.22.1. 11.16.0 is the
        # version bundled with the Node 24 above, so it is tested together.
        run: npm install -g npm@11.16.0

      - name: Install dependencies
        if: (steps.release-type.outputs.snapshot == 'true' && steps.snapshot-changesets.outputs.skip != 'true') || (steps.changesets.outputs.skip != 'true' && steps.quick-check.outputs.skip != 'true')
        run: pnpm install --frozen-lockfile

      - name: Determine packages to publish
        if: steps.release-type.outputs.snapshot == 'false' && steps.changesets.outputs.skip != 'true' && steps.quick-check.outputs.skip != 'true'
        id: packages
        run: |
          check_package() {
            local pkg_name=$1
            local pkg_path=$2
            local output_key=$3

            LOCAL_VERSION=$(node -p "require('./${pkg_path}/package.json').version")
            NPM_VERSION=$(npm view "$pkg_name" version 2>/dev/null || echo "0.0.0")

            echo "${pkg_name}: local=${LOCAL_VERSION} npm=${NPM_VERSION}"

            if [ "$LOCAL_VERSION" != "$NPM_VERSION" ]; then
              echo "publish_${output_key}=true" >> $GITHUB_OUTPUT
              echo "version_${output_key}=${LOCAL_VERSION}" >> $GITHUB_OUTPUT

              # Determine appropriate npm dist-tag via semver comparison
              IS_NEWER=$(node -e "
                const [a,b,c] = '${LOCAL_VERSION}'.split('.').map(Number);
                const [x,y,z] = '${NPM_VERSION}'.split('.').map(Number);
                console.log(a>x||(a===x&&(b>y||(b===y&&c>z))));
              ")
              if [ "$IS_NEWER" = "true" ]; then
                echo "tag_${output_key}=latest" >> $GITHUB_OUTPUT
              else
                MINOR=$(echo "$LOCAL_VERSION" | sed 's/\.[0-9]*$//')
                echo "tag_${output_key}=release-${MINOR}" >> $GITHUB_OUTPUT
              fi
            else
              echo "publish_${output_key}=false" >> $GITHUB_OUTPUT
            fi
          }

          check_package "@salesforce/b2c-tooling-sdk" "packages/b2c-tooling-sdk" "sdk"
          check_package "@salesforce/b2c-cli" "packages/b2c-cli" "cli"
          check_package "@salesforce/b2c-dx-mcp" "packages/b2c-dx-mcp" "mcp"
          check_package "@salesforce/mrt-utilities" "packages/mrt-utilities" "mrt"

          # VS Code extension — compare against git tags (not npm)
          LOCAL_VSX_VERSION=$(node -p "require('./packages/b2c-vs-extension/package.json').version")
          LAST_VSX_TAG=$(git tag -l "b2c-vs-extension@*" --sort=-v:refname | grep -v '@latest$' | head -1 | sed 's/b2c-vs-extension@//')
          echo "b2c-vs-extension: local=${LOCAL_VSX_VERSION} tag=${LAST_VSX_TAG:-none}"
          if [ "$LOCAL_VSX_VERSION" != "$LAST_VSX_TAG" ]; then
            echo "publish_vsx=true" >> $GITHUB_OUTPUT
            echo "version_vsx=${LOCAL_VSX_VERSION}" >> $GITHUB_OUTPUT
          else
            echo "publish_vsx=false" >> $GITHUB_OUTPUT
          fi

          # Check if docs version changed (private package — not published to npm, uses git tag)
          DOCS_VERSION=$(node -p "require('./docs/package.json').version")
          if git rev-parse "docs@${DOCS_VERSION}" >/dev/null 2>&1; then
            echo "publish_docs=false" >> $GITHUB_OUTPUT
          else
            echo "publish_docs=true" >> $GITHUB_OUTPUT
            echo "version_docs=${DOCS_VERSION}" >> $GITHUB_OUTPUT
          fi
          echo "@salesforce/b2c-docs: version=${DOCS_VERSION}"

          # Check if agent-plugins version changed (private package — uses git tag)
          PLUGINS_VERSION=$(node -p "require('./skills/package.json').version")
          if git rev-parse "b2c-agent-plugins@${PLUGINS_VERSION}" >/dev/null 2>&1; then
            echo "publish_plugins=false" >> $GITHUB_OUTPUT
          else
            echo "publish_plugins=true" >> $GITHUB_OUTPUT
            echo "version_plugins=${PLUGINS_VERSION}" >> $GITHUB_OUTPUT
          fi
          echo "@salesforce/b2c-agent-plugins: version=${PLUGINS_VERSION}"

      # Snapshot channels (nightly, beta) = a PREVIEW of the next release. Rather
      # than force every package to a synthetic 0.0.0-<channel>.<ts> (which sorts
      # below every real version and republishes packages that never changed), we
      # let Changesets compute each bumped package's real next semver and append
      # the snapshot suffix. With snapshot.useCalculatedVersion +
      # prereleaseTemplate "{tag}.{datetime}" in .changeset/config.json, a package
      # bumping to 1.22.0 becomes 1.22.0-<channel>.<YYYYMMDDHHMMSS> (channel =
      # nightly or beta, taken from the resolved dist-tag). Only packages with a
      # pending changeset are bumped; the rest keep their released version and we
      # do NOT publish them (publishing an unchanged version is a hard npm
      # failure). This is an ephemeral, in-workspace bump only — nothing is
      # committed or tagged.
      - name: Create snapshot versions
        if: steps.release-type.outputs.snapshot == 'true' && steps.snapshot-changesets.outputs.skip != 'true'
        id: snapshot
        env:
          # The dist-tag ('nightly' | 'beta') doubles as the snapshot suffix
          # label. Bound to an env var (not interpolated) — it is the value
          # `changeset version --snapshot` embeds into the published version.
          CHANNEL: ${{ steps.release-type.outputs.tag }}
        run: |
          set -euo pipefail
          pnpm changeset version --snapshot "$CHANNEL"

          # A package was bumped iff its version now carries the -<channel>. suffix.
          # Emit a per-package publish flag so the publish steps below only push
          # the packages that actually changed this cycle.
          snapshot_flag() {
            local pkg_path=$1
            local output_key=$2
            local version
            version=$(node -p "require('./${pkg_path}/package.json').version")
            if [[ "$version" == *-"$CHANNEL".* ]]; then
              echo "publish_snapshot_${output_key}=true" >> "$GITHUB_OUTPUT"
              echo "::notice::$CHANNEL ${pkg_path} -> ${version}"
            else
              echo "publish_snapshot_${output_key}=false" >> "$GITHUB_OUTPUT"
            fi
          }

          snapshot_flag "packages/b2c-tooling-sdk" "sdk"
          snapshot_flag "packages/b2c-cli" "cli"
          snapshot_flag "packages/b2c-dx-mcp" "mcp"
          snapshot_flag "packages/mrt-utilities" "mrt"

      - name: Build packages
        if: (steps.release-type.outputs.snapshot == 'true' && steps.snapshot-changesets.outputs.skip != 'true') || (steps.changesets.outputs.skip != 'true' && steps.quick-check.outputs.skip != 'true')
        run: pnpm run build

      - name: Run tests
        if: (steps.release-type.outputs.snapshot == 'true' && steps.snapshot-changesets.outputs.skip != 'true') || (steps.changesets.outputs.skip != 'true' && steps.quick-check.outputs.skip != 'true')
        run: pnpm --filter '!b2c-vs-extension' run test

      # Inline npm publish runs for snapshot (nightly/beta) and direct stable
      # ONLY. rc is deliberately excluded here: its npm publish is deferred to
      # the environment-gated `publish-npm-rc` job (manual approval) so a human
      # approves the rc push, and promotion later moves the tag rc -> latest.
      - name: Publish SDK to npm
        if: (steps.snapshot.outputs.publish_snapshot_sdk == 'true' || steps.packages.outputs.publish_sdk == 'true') && steps.release-type.outputs.type != 'rc'
        id: publish-sdk
        continue-on-error: true
        run: >-
          pnpm --filter @salesforce/b2c-tooling-sdk publish --provenance --no-git-checks
          --tag ${{ steps.release-type.outputs.snapshot == 'true' && steps.release-type.outputs.tag || steps.packages.outputs.tag_sdk }}

      - name: Publish CLI to npm
        if: (steps.snapshot.outputs.publish_snapshot_cli == 'true' || steps.packages.outputs.publish_cli == 'true') && steps.release-type.outputs.type != 'rc'
        id: publish-cli
        continue-on-error: true
        run: >-
          pnpm --filter @salesforce/b2c-cli publish --provenance --no-git-checks
          --tag ${{ steps.release-type.outputs.snapshot == 'true' && steps.release-type.outputs.tag || steps.packages.outputs.tag_cli }}

      - name: Publish MCP to npm
        if: (steps.snapshot.outputs.publish_snapshot_mcp == 'true' || steps.packages.outputs.publish_mcp == 'true') && steps.release-type.outputs.type != 'rc'
        id: publish-mcp
        continue-on-error: true
        run: >-
          pnpm --filter @salesforce/b2c-dx-mcp publish --provenance --no-git-checks
          --tag ${{ steps.release-type.outputs.snapshot == 'true' && steps.release-type.outputs.tag || steps.packages.outputs.tag_mcp }}

      - name: Publish MRT Utilities to npm
        if: (steps.snapshot.outputs.publish_snapshot_mrt == 'true' || steps.packages.outputs.publish_mrt == 'true') && steps.release-type.outputs.type != 'rc'
        id: publish-mrt
        continue-on-error: true
        run: >-
          pnpm --filter @salesforce/mrt-utilities publish --provenance --no-git-checks
          --tag ${{ steps.release-type.outputs.snapshot == 'true' && steps.release-type.outputs.tag || steps.packages.outputs.tag_mrt }}

      # The VSIX Marketplace number CANNOT be the changeset/npm version: the
      # Marketplace rejects semver pre-release suffixes, caps each component at
      # int32, requires every upload to be strictly higher than the highest
      # already-published version, and forbids a pre-release and a stable sharing
      # a number. So the VSIX rides its OWN monotonic line (even minor = stable,
      # odd minor = pre-release), while the changeset version stays the release
      # trigger + git-tag/npm identity.
      #
      # That line is SELF-REFERENTIAL — the next stable/pre-release derives from
      # the CURRENT published stable, which is the highest EVEN-minor VSIX already
      # present as an asset of a NON-prerelease b2c-vs-extension release. Reading
      # it from release history (not package.json) is what keeps the line
      # monotonic across cycles regardless of how the changeset semver walks.
      # NON-prerelease is essential: the build-once candidate stable VSIX (e.g.
      # 1.2.0) is attached to the rc PRERELEASE release before promotion, so
      # counting prereleases would skip the line two minors ahead. Seed 1.0.2
      # (the extension's real current stable) when no stable release exists yet.
      # Every VSIX-building path (direct-stable, snapshot, rc build-once) reads
      # this one output.
      - name: Resolve current Marketplace stable (from release history)
        id: mkt-base
        if: >-
          (steps.release-type.outputs.snapshot == 'true' && steps.snapshot-changesets.outputs.skip != 'true')
          || (steps.release-type.outputs.type != '' && steps.packages.outputs.publish_vsx == 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          CURRENT_STABLE="1.0.2"   # seed: the extension's real current stable
          BEST_MAJOR=1; BEST_MINOR=0
          while IFS= read -r name; do
            ver=$(printf '%s\n' "$name" | sed -nE 's/^b2c-vs-extension-([0-9]+)\.([0-9]+)\.[0-9]+\.vsix$/\1 \2/p')
            [ -n "$ver" ] || continue
            mj=${ver%% *}; mn=${ver##* }
            # even minor only (the stable track); odd minor = a pre-release asset.
            [ $((mn % 2)) -eq 0 ] || continue
            if [ "$mj" -gt "$BEST_MAJOR" ] || { [ "$mj" -eq "$BEST_MAJOR" ] && [ "$mn" -gt "$BEST_MINOR" ]; }; then
              BEST_MAJOR=$mj; BEST_MINOR=$mn; CURRENT_STABLE="${mj}.${mn}.0"
            fi
          done < <(gh api --paginate "repos/${GITHUB_REPOSITORY}/releases" --jq '.[] | select(.prerelease==false) | .assets[].name' 2>/dev/null || true)
          echo "current_stable=$CURRENT_STABLE" >> "$GITHUB_OUTPUT"
          echo "::notice::current Marketplace stable (from release history): $CURRENT_STABLE"

      # Direct-stable escape hatch (release/** CI-success or manual stable).
      # Stable ships the NEXT EVEN minor above the current published stable (e.g.
      # 1.0.2 -> 1.2.0), computed from the release-history base above — NOT the
      # changeset semver, which would sit below any already-published pre-release
      # and be rejected as a regression. Both GA paths (direct-stable and rc
      # promotion) therefore land on the SAME even-minor line, and b2c-dx
      # classifies every stable asset uniformly. The git tag / release identity
      # stays the changeset semver (steps.packages.outputs.version_vsx); only the
      # baked VSIX version is the Marketplace scheme. Fails closed on any
      # int32/semver/odd-minor breach before an irreversible publish.
      - name: Resolve stable VSIX version (marketplace scheme)
        if: steps.release-type.outputs.type == 'stable' && steps.packages.outputs.publish_vsx == 'true'
        working-directory: packages/b2c-vs-extension
        env:
          CURRENT_STABLE: ${{ steps.mkt-base.outputs.current_stable }}
        run: |
          set -euo pipefail
          VERSION=$(node scripts/marketplace-version.mjs --channel stable --current-stable "$CURRENT_STABLE" --write)
          echo "::notice::stable VSIX marketplace version: $VERSION (current stable $CURRENT_STABLE)"

      - name: Package VS Code extension
        if: steps.release-type.outputs.type == 'stable' && steps.packages.outputs.publish_vsx == 'true'
        working-directory: packages/b2c-vs-extension
        run: pnpm run package

      # --- Snapshot (nightly/beta) VSIX -> S3 delivery ------------------------
      # Nightly and beta ALSO ship a VSIX to the Marketplace, but indirectly: the
      # monorepo attests it and drops it in an S3 bucket, and b2c-dx pulls from
      # there, re-verifies, and publishes to the public pre-release channel. The
      # S3 infrastructure (OIDC role + bucket) is provisioned outside this repo,
      # so — exactly like docs-preview.yml — we gate the whole path on the role
      # secret existing and no-op green when it does not, rather than failing
      # every nightly red until the infra lands.
      - name: Check VSIX S3 delivery is configured
        id: vsix-s3-cfg
        if: >-
          steps.release-type.outputs.snapshot == 'true'
          && steps.snapshot-changesets.outputs.skip != 'true'
        env:
          VSIX_S3_ROLE_ARN: ${{ secrets.VSIX_S3_ROLE_ARN }}
        run: |
          if [ -n "$VSIX_S3_ROLE_ARN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::VSIX S3 delivery not configured (VSIX_S3_ROLE_ARN missing); skipping nightly/beta VSIX build + upload."
          fi

      # Credentials come before the version resolve because beta reads the S3
      # channel prefix to compute its within-day sequence (see below).
      - name: Configure AWS credentials for VSIX upload
        if: >-
          steps.release-type.outputs.snapshot == 'true'
          && steps.snapshot-changesets.outputs.skip != 'true'
          && steps.vsix-s3-cfg.outputs.enabled == 'true'
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.VSIX_S3_ROLE_ARN }}
          aws-region: ${{ vars.VSIX_S3_REGION || 'us-east-1' }}

      # The Marketplace rejects semver pre-release suffixes and caps every version
      # component at int32, so the VSIX version CANNOT be the changeset/npm version
      # (which `changeset version --snapshot` just rewrote in the working tree to
      # e.g. 1.22.0-nightly.<ts>). marketplace-version.mjs computes the numeric-only,
      # channel-encoded version on the odd-minor pre-release track derived from the
      # CURRENT published stable (resolved from release history in the mkt-base step
      # above — NOT the changeset semver) and --write's it back into package.json so
      # `vsce package` bakes it in. The script fails closed on any int32/semver/
      # odd-minor breach — a bad version must never reach an irreversible publish.
      - name: Resolve pre-release VSIX version
        id: vsix-version
        if: >-
          steps.release-type.outputs.snapshot == 'true'
          && steps.snapshot-changesets.outputs.skip != 'true'
          && steps.vsix-s3-cfg.outputs.enabled == 'true'
        working-directory: packages/b2c-vs-extension
        env:
          CHANNEL: ${{ steps.release-type.outputs.type }} # nightly | beta
          CURRENT_STABLE: ${{ steps.mkt-base.outputs.current_stable }}
          VSIX_S3_BUCKET: ${{ secrets.VSIX_S3_BUCKET }}
          VSIX_S3_PREFIX: ${{ vars.VSIX_S3_PREFIX }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y%m%d)

          SEQ=0
          if [ "$CHANNEL" = "beta" ]; then
            # Beta encodes a within-day sequence NN (01..99). The authoritative
            # record of today's betas is the S3 channel prefix we publish into, so
            # list it and take max+1. Develop merges are effectively serialized by
            # CI (workflow_run fires per completed CI run), so the list-then-bump
            # race is negligible; NN>99 fails closed rather than overflow the slot.
            PREFIX="${VSIX_S3_PREFIX:+${VSIX_S3_PREFIX%/}/}"
            MAX=0
            while IFS= read -r line; do
              NN=$(printf '%s\n' "$line" | sed -nE "s/.*\.${DATE}([0-9]{2})\.vsix\$/\1/p")
              [ -n "$NN" ] || continue
              NN=$((10#$NN))
              [ "$NN" -gt "$MAX" ] && MAX=$NN
            done < <(aws s3 ls "s3://${VSIX_S3_BUCKET}/${PREFIX}beta/" 2>/dev/null || true)
            SEQ=$((MAX + 1))
            if [ "$SEQ" -gt 99 ]; then
              echo "::error::beta within-day sequence exceeded 99 for ${DATE}"
              exit 1
            fi
          fi

          VERSION=$(node scripts/marketplace-version.mjs --channel "$CHANNEL" --current-stable "$CURRENT_STABLE" --date "$DATE" --seq "$SEQ" --write)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "::notice::pre-release VSIX version ($CHANNEL): $VERSION (current stable $CURRENT_STABLE)"

      - name: Package VS Code extension (pre-release)
        if: >-
          steps.release-type.outputs.snapshot == 'true'
          && steps.snapshot-changesets.outputs.skip != 'true'
          && steps.vsix-s3-cfg.outputs.enabled == 'true'
        working-directory: packages/b2c-vs-extension
        run: pnpm run package:pre-release

      # Trust anchor: hash the exact artifact that will be uploaded to the release
      # and attested below. b2c-dx re-computes and compares this before publishing.
      # We resolve the filename ONCE here and reuse it for the hash, the attestation
      # subject, and the release upload — so the hashed bytes, the attested bytes,
      # and the uploaded bytes are provably the same file. A count!=1 guard fails
      # closed: if `pnpm run package` ever emits more than one VSIX, a bare glob
      # would let the hash anchor, the attested set, and the uploaded set diverge.
      - name: Compute VSIX sha256
        id: vsix-hash
        if: >-
          (steps.release-type.outputs.type == 'stable' && steps.packages.outputs.publish_vsx == 'true')
          || (steps.release-type.outputs.snapshot == 'true' && steps.snapshot-changesets.outputs.skip != 'true' && steps.vsix-s3-cfg.outputs.enabled == 'true')
        working-directory: packages/b2c-vs-extension
        run: |
          set -euo pipefail
          COUNT=$(ls *.vsix 2>/dev/null | wc -l | tr -d ' ')
          if [ "$COUNT" -ne 1 ]; then
            echo "::error::expected exactly one .vsix from 'pnpm run package', found $COUNT"
            exit 1
          fi
          VSIX=$(ls *.vsix)
          SHA=$(sha256sum "$VSIX" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "vsix_file=$VSIX" >> "$GITHUB_OUTPUT"
          echo "::notice::VSIX $VSIX sha256=$SHA"

      # SLSA build provenance: cryptographically binds the VSIX to this repo,
      # commit, and workflow run. This is the provenance b2c-dx verifies with
      # `gh attestation verify` before it can publish to the marketplaces.
      # Attest the exact resolved file (not a glob) so the attested subject is
      # identical to the hashed and uploaded artifact.
      - name: Attest VSIX build provenance
        if: >-
          (steps.release-type.outputs.type == 'stable' && steps.packages.outputs.publish_vsx == 'true')
          || (steps.release-type.outputs.snapshot == 'true' && steps.snapshot-changesets.outputs.skip != 'true' && steps.vsix-s3-cfg.outputs.enabled == 'true')
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: packages/b2c-vs-extension/${{ steps.vsix-hash.outputs.vsix_file }}

      # Upload the attested nightly/beta VSIX + its sha256 sidecar to S3. b2c-dx
      # polls this prefix, re-verifies the SLSA attestation and the sha256, and
      # only then publishes to the public pre-release channel — so the bytes we
      # hashed and attested just above are exactly the bytes that get published.
      # The sha256 sidecar is the committed marker b2c-dx cross-checks against
      # (mirrors the release-asset marker on the stable path). Layout:
      #   s3://<bucket>/<prefix>/<channel>/<file>.vsix        (+ .vsix.sha256)
      - name: Upload pre-release VSIX to S3
        if: >-
          steps.release-type.outputs.snapshot == 'true'
          && steps.snapshot-changesets.outputs.skip != 'true'
          && steps.vsix-s3-cfg.outputs.enabled == 'true'
        working-directory: packages/b2c-vs-extension
        env:
          CHANNEL: ${{ steps.release-type.outputs.type }}
          VSIX_FILE: ${{ steps.vsix-hash.outputs.vsix_file }}
          VSIX_SHA256: ${{ steps.vsix-hash.outputs.sha256 }}
          VSIX_S3_BUCKET: ${{ secrets.VSIX_S3_BUCKET }}
          VSIX_S3_PREFIX: ${{ vars.VSIX_S3_PREFIX }}
        run: |
          set -euo pipefail
          PREFIX="${VSIX_S3_PREFIX:+${VSIX_S3_PREFIX%/}/}"
          DEST="s3://${VSIX_S3_BUCKET}/${PREFIX}${CHANNEL}"

          # Write the sha256 marker sidecar (same digest attested above) alongside
          # the VSIX so b2c-dx can fail closed on any mismatch before publishing.
          printf '%s  %s\n' "$VSIX_SHA256" "$VSIX_FILE" > "${VSIX_FILE}.sha256"

          # --no-guess-mime-type + explicit content-type keeps the object type
          # stable regardless of the runner's mime db.
          aws s3 cp "$VSIX_FILE" "${DEST}/${VSIX_FILE}" \
            --no-guess-mime-type --content-type application/octet-stream
          aws s3 cp "${VSIX_FILE}.sha256" "${DEST}/${VSIX_FILE}.sha256" \
            --no-guess-mime-type --content-type text/plain
          echo "::notice::uploaded $VSIX_FILE (+ .sha256) to ${DEST}/"

      # --- rc build-once: BOTH VSIX (rc-prerelease + stable) in one release ----
      # rc is the human-gated GA candidate. In a single run we build BOTH the
      # rc-prerelease VSIX (odd minor, 1.1.<date>D, vsce --pre-release) AND the
      # stable VSIX (next even minor, e.g. 1.2.0, no pre-release flag) from the
      # SAME commit, attest both, and put both in ONE prerelease GitHub release.
      # Promotion (promote.yml) later flips that same release to latest and b2c-dx
      # publishes the STABLE asset — the exact bytes attested here, never rebuilt.
      # Two VSIX cannot coexist in the package dir (the inject step + sha guard
      # assume one), so each is built and moved into dist-vsix/ before the next.
      # Both versions derive from the CURRENT published stable resolved from
      # release history (mkt-base step) — NOT the changeset semver — so the
      # Marketplace line stays monotonic across cycles.
      - name: Build rc + stable VSIX (build-once)
        id: rc-vsix
        if: steps.release-type.outputs.type == 'rc' && steps.packages.outputs.publish_vsx == 'true'
        working-directory: packages/b2c-vs-extension
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CURRENT_STABLE: ${{ steps.mkt-base.outputs.current_stable }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y%m%d)
          mkdir -p dist-vsix

          # rc within-day sequence D (1..9). The authoritative record of today's
          # rc cuts is the set of rc assets already attached to prerelease
          # releases in this repo, so scan them and take max+1. A do-not-promote
          # re-cut therefore gets the next D rather than colliding. >9 fails
          # closed (the single-digit tail is a locked, irreversible scheme).
          MAX=0
          while IFS= read -r name; do
            D=$(printf '%s\n' "$name" | sed -nE "s/^b2c-vs-extension-[0-9]+\.[0-9]+\.${DATE}([1-9])\.vsix\$/\1/p")
            [ -n "$D" ] || continue
            [ "$D" -gt "$MAX" ] && MAX=$D
          done < <(gh api --paginate "repos/${GITHUB_REPOSITORY}/releases" --jq '.[] | select(.prerelease==true) | .assets[].name' 2>/dev/null || true)
          D=$((MAX + 1))
          if [ "$D" -gt 9 ]; then
            echo "::error::rc within-day sequence exceeded 9 for ${DATE}"
            exit 1
          fi

          # Build one channel's VSIX, verify exactly one artifact, hash it, and
          # stage it (+ sha256 sidecar) into dist-vsix/ before the next build.
          build_one() {
            local channel=$1 seq=$2 ver script
            if [ "$channel" = "stable" ]; then
              ver=$(node scripts/marketplace-version.mjs --channel stable --current-stable "$CURRENT_STABLE" --write)
              script=package
            else
              ver=$(node scripts/marketplace-version.mjs --channel rc --current-stable "$CURRENT_STABLE" --date "$DATE" --seq "$seq" --write)
              script=package:pre-release
            fi
            pnpm run "$script"
            local count
            count=$(ls ./*.vsix 2>/dev/null | wc -l | tr -d ' ')
            if [ "$count" -ne 1 ]; then
              echo "::error::expected exactly one .vsix for $channel, found $count"
              exit 1
            fi
            local f sha
            f=$(ls ./*.vsix); f=${f#./}
            sha=$(sha256sum "$f" | awk '{print $1}')
            mv "$f" dist-vsix/
            printf '%s  %s\n' "$sha" "$f" > "dist-vsix/${f}.sha256"
            echo "::notice::built $channel VSIX $f ($ver) sha256=$sha"
            echo "${channel}_file=$f" >> "$GITHUB_OUTPUT"
            echo "${channel}_version=$ver" >> "$GITHUB_OUTPUT"
          }

          build_one stable 0
          build_one rc "$D"
          echo "rc_seq=$D" >> "$GITHUB_OUTPUT"

      # SLSA build provenance for BOTH staged VSIX at once. b2c-dx re-verifies this
      # (with --source-ref refs/heads/main) before publishing either asset, so the
      # attested bytes are exactly the published bytes on both the prerelease and
      # the eventual stable publish.
      - name: Attest rc + stable VSIX provenance
        if: steps.release-type.outputs.type == 'rc' && steps.packages.outputs.publish_vsx == 'true'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: packages/b2c-vs-extension/dist-vsix/*.vsix

      - name: Create git tags
        if: steps.release-type.outputs.type == 'stable' && steps.changesets.outputs.skip != 'true' && steps.quick-check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TAGS_CREATED=""

          # Create a tag only if it does not already exist locally or on the
          # remote. A prior partial publish run may have already pushed a tag
          # for this version; skipping it keeps re-runs idempotent instead of
          # failing the step with "tag already exists".
          create_tag() {
            local tag="$1"
            if git rev-parse -q --verify "refs/tags/$tag" >/dev/null || \
               git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
              echo "Tag already exists, skipping: $tag"
              return
            fi
            git tag "$tag"
            TAGS_CREATED="$TAGS_CREATED $tag"
          }

          if [[ "${{ steps.packages.outputs.publish_sdk }}" == "true" ]]; then
            create_tag "@salesforce/b2c-tooling-sdk@${{ steps.packages.outputs.version_sdk }}"
          fi

          if [[ "${{ steps.packages.outputs.publish_cli }}" == "true" ]]; then
            create_tag "@salesforce/b2c-cli@${{ steps.packages.outputs.version_cli }}"
          fi

          if [[ "${{ steps.packages.outputs.publish_mcp }}" == "true" ]]; then
            create_tag "@salesforce/b2c-dx-mcp@${{ steps.packages.outputs.version_mcp }}"
          fi

          if [[ "${{ steps.packages.outputs.publish_mrt }}" == "true" ]]; then
            create_tag "@salesforce/mrt-utilities@${{ steps.packages.outputs.version_mrt }}"
          fi

          if [[ "${{ steps.packages.outputs.publish_vsx }}" == "true" ]]; then
            create_tag "b2c-vs-extension@${{ steps.packages.outputs.version_vsx }}"
          fi

          if [ -n "$TAGS_CREATED" ]; then
            git push origin $TAGS_CREATED
            echo "Created tags:$TAGS_CREATED"
          else
            echo "No tags to create"
          fi

      - name: Update b2c-vs-extension@latest tag
        if: steps.release-type.outputs.type == 'stable' && steps.packages.outputs.publish_vsx == 'true'
        run: |
          git tag -f b2c-vs-extension@latest
          git push origin b2c-vs-extension@latest --force
          echo "Updated b2c-vs-extension@latest tag to $(git rev-parse HEAD)"

      - name: Update v1 Actions tag
        if: steps.release-type.outputs.type == 'stable' && steps.changesets.outputs.skip != 'true' && steps.quick-check.outputs.skip != 'true'
        run: |
          git tag -f v1
          git push origin v1 --force
          echo "Updated v1 tag to $(git rev-parse HEAD)"

      - name: Create docs tag if version changed
        if: steps.release-type.outputs.type == 'stable' && steps.changesets.outputs.skip != 'true' && steps.quick-check.outputs.skip != 'true' && steps.packages.outputs.publish_docs == 'true'
        run: |
          DOCS_TAG="docs@${{ steps.packages.outputs.version_docs }}"
          git tag "$DOCS_TAG"
          git push origin "$DOCS_TAG"
          echo "Created docs tag: $DOCS_TAG"

      # Runs for both real channels (stable and rc): builds the combined npm
      # changelog that the stable "Version Packages" release AND the unified rc
      # prerelease release both use as their notes body.
      - name: Extract changelogs for release
        if: steps.release-type.outputs.snapshot == 'false' && steps.changesets.outputs.skip != 'true' && steps.quick-check.outputs.skip != 'true'
        run: |
          # Function to extract the latest version section from a changelog
          extract_latest() {
            awk '
              /^## / { if (found) exit; found=1; next }
              found { print }
            ' "$1"
          }

          # Build combined release notes for published packages
          {
            if [[ "${{ steps.packages.outputs.publish_cli }}" == "true" ]]; then
              echo "## @salesforce/b2c-cli@${{ steps.packages.outputs.version_cli }}"
              echo ""
              extract_latest packages/b2c-cli/CHANGELOG.md
              echo ""
            fi

            if [[ "${{ steps.packages.outputs.publish_mcp }}" == "true" ]]; then
              echo "## @salesforce/b2c-dx-mcp@${{ steps.packages.outputs.version_mcp }}"
              echo ""
              extract_latest packages/b2c-dx-mcp/CHANGELOG.md
              echo ""
            fi

            if [[ "${{ steps.packages.outputs.publish_sdk }}" == "true" ]]; then
              echo "## @salesforce/b2c-tooling-sdk@${{ steps.packages.outputs.version_sdk }}"
              echo ""
              extract_latest packages/b2c-tooling-sdk/CHANGELOG.md
              echo ""
            fi

            if [[ "${{ steps.packages.outputs.publish_mrt }}" == "true" ]]; then
              echo "## @salesforce/mrt-utilities@${{ steps.packages.outputs.version_mrt }}"
              echo ""
              extract_latest packages/mrt-utilities/CHANGELOG.md
              echo ""
            fi

            if [[ "${{ steps.packages.outputs.publish_vsx }}" == "true" ]]; then
              echo "## b2c-vs-extension@${{ steps.packages.outputs.version_vsx }}"
              echo ""
              extract_latest packages/b2c-vs-extension/CHANGELOG.md
              echo ""
            fi

            if [[ "${{ steps.packages.outputs.publish_docs }}" == "true" && -f docs/CHANGELOG.md ]]; then
              echo "## Documentation"
              echo ""
              extract_latest docs/CHANGELOG.md
              echo ""
            fi

            if [[ "${{ steps.packages.outputs.publish_plugins }}" == "true" && -f skills/CHANGELOG.md ]]; then
              echo "## Agent Skills Plugins"
              echo ""
              extract_latest skills/CHANGELOG.md
              echo ""
            fi
          } > /tmp/release-notes.md

      # rc build-once: ONE unified prerelease release, tagged by the changeset VSX
      # semver (the identity promote.yml flips). It carries the combined npm
      # changelog (prepended with the build-once artifact table) AND both VSIX +
      # their .sha256 markers. Marked --prerelease so b2c-dx publishes the rc asset
      # now and only picks up the stable asset once the release is promoted;
      # nothing is ever rebuilt. Idempotent on re-run via --clobber.
      - name: Create unified rc prerelease release
        if: steps.release-type.outputs.type == 'rc' && steps.packages.outputs.publish_vsx == 'true'
        working-directory: packages/b2c-vs-extension
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VSX_SEMVER: ${{ steps.packages.outputs.version_vsx }}
          RC_FILE: ${{ steps.rc-vsix.outputs.rc_file }}
          RC_VERSION: ${{ steps.rc-vsix.outputs.rc_version }}
          STABLE_FILE: ${{ steps.rc-vsix.outputs.stable_file }}
          STABLE_VERSION: ${{ steps.rc-vsix.outputs.stable_version }}
        run: |
          set -euo pipefail
          VSX_TAG="b2c-vs-extension@${VSX_SEMVER}"

          # Prepend the build-once artifact table to the combined npm changelog
          # produced by the previous step (/tmp/release-notes.md). Only the
          # heredoc header is de-indented (sed); the changelog is appended verbatim
          # so its own indentation (nested lists, code blocks) is preserved.
          sed 's/^          //' > /tmp/rc-release-notes.md <<HEADER
          ## Release Candidate — build-once

          This release carries both VSIX artifacts, built once from this commit:

          | Channel | Marketplace version | File |
          | --- | --- | --- |
          | Release candidate (pre-release) | ${RC_VERSION} | ${RC_FILE} |
          | Stable (published on promotion) | ${STABLE_VERSION} | ${STABLE_FILE} |

          While marked *pre-release*, b2c-dx publishes the release candidate to the
          Marketplace pre-release channel. On promotion the same release is flipped
          to latest and the stable artifact is published — the exact bytes attested
          here, never rebuilt.

          ---

          HEADER
          cat /tmp/release-notes.md >> /tmp/rc-release-notes.md

          if gh release view "$VSX_TAG" >/dev/null 2>&1; then
            echo "Release $VSX_TAG exists; refreshing assets"
            gh release upload "$VSX_TAG" dist-vsix/* --clobber
          else
            gh release create "$VSX_TAG" \
              --prerelease \
              --latest=false \
              --title "Release Candidate ${VSX_SEMVER}" \
              --notes-file /tmp/rc-release-notes.md
            gh release upload "$VSX_TAG" dist-vsix/*
          fi

      - name: Create GitHub Release
        if: steps.release-type.outputs.type == 'stable' && steps.changesets.outputs.skip != 'true' && steps.quick-check.outputs.skip != 'true'
        run: |
          # Determine the release tag — prefer CLI as the user-facing product.
          # Plugins and VSX get their own dedicated releases, so they are excluded here.
          if [[ "${{ steps.packages.outputs.publish_cli }}" == "true" ]]; then
            RELEASE_TAG="@salesforce/b2c-cli@${{ steps.packages.outputs.version_cli }}"
          elif [[ "${{ steps.packages.outputs.publish_sdk }}" == "true" ]]; then
            RELEASE_TAG="@salesforce/b2c-tooling-sdk@${{ steps.packages.outputs.version_sdk }}"
          elif [[ "${{ steps.packages.outputs.publish_mcp }}" == "true" ]]; then
            RELEASE_TAG="@salesforce/b2c-dx-mcp@${{ steps.packages.outputs.version_mcp }}"
          elif [[ "${{ steps.packages.outputs.publish_mrt }}" == "true" ]]; then
            RELEASE_TAG="@salesforce/mrt-utilities@${{ steps.packages.outputs.version_mrt }}"
          elif [[ "${{ steps.packages.outputs.publish_docs }}" == "true" ]]; then
            RELEASE_TAG="docs@${{ steps.packages.outputs.version_docs }}"
          else
            echo "No non-VSX/non-plugins packages published, skipping main release"
            exit 0
          fi

          # Build a human-readable title from published package versions
          TITLE_PARTS=()
          [[ "${{ steps.packages.outputs.publish_cli }}" == "true" ]] && TITLE_PARTS+=("b2c-cli ${{ steps.packages.outputs.version_cli }}")
          [[ "${{ steps.packages.outputs.publish_sdk }}" == "true" ]] && TITLE_PARTS+=("b2c-tooling-sdk ${{ steps.packages.outputs.version_sdk }}")
          [[ "${{ steps.packages.outputs.publish_mcp }}" == "true" ]] && TITLE_PARTS+=("b2c-dx-mcp ${{ steps.packages.outputs.version_mcp }}")
          [[ "${{ steps.packages.outputs.publish_mrt }}" == "true" ]] && TITLE_PARTS+=("mrt-utilities ${{ steps.packages.outputs.version_mrt }}")
          [[ "${{ steps.packages.outputs.publish_vsx }}" == "true" ]] && TITLE_PARTS+=("b2c-vs-extension ${{ steps.packages.outputs.version_vsx }}")
          [[ "${{ steps.packages.outputs.publish_docs }}" == "true" ]] && TITLE_PARTS+=("docs ${{ steps.packages.outputs.version_docs }}")
          RELEASE_TITLE="Version Packages — $(IFS=', '; echo "${TITLE_PARTS[*]}")"

          gh release create "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes-file /tmp/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package skills artifacts
        if: steps.release-type.outputs.type == 'stable' && steps.changesets.outputs.skip != 'true' && steps.quick-check.outputs.skip != 'true' && steps.packages.outputs.publish_plugins == 'true'
        id: package-skills
        run: |
          # Plugins to package are listed in skills/plugins.json. Each entry maps
          # to a skills/<name>/ directory whose skills/ subfolder is zipped into
          # <name>-skills.zip. Adding a plugin there requires no change to this
          # workflow.
          ZIPS=""
          while IFS= read -r name; do
            [ -n "$name" ] || continue
            plugin_dir="skills/$name"
            if [ ! -d "$plugin_dir/skills" ]; then
              echo "::error::Plugin '$name' from skills/plugins.json has no $plugin_dir/skills directory"
              exit 1
            fi
            zipfile="${name}-skills.zip"
            (cd "$plugin_dir" && zip -r "$GITHUB_WORKSPACE/$zipfile" skills/ -x "*/evals/*")
            ZIPS="$ZIPS $zipfile"
          done < <(jq -r '.plugins[].name' skills/plugins.json)
          if [ -z "$ZIPS" ]; then
            echo "::error::No plugins listed in skills/plugins.json"
            exit 1
          fi
          # Trim leading space; persist space-separated list for the upload step
          echo "zips=${ZIPS# }" >> "$GITHUB_OUTPUT"
          echo "Created skills artifacts:"
          ls -la *.zip

      - name: Upload skills to release
        if: steps.release-type.outputs.type == 'stable' && steps.changesets.outputs.skip != 'true' && steps.quick-check.outputs.skip != 'true' && steps.packages.outputs.publish_plugins == 'true'
        run: |
          RELEASE_TAG="b2c-agent-plugins@${PLUGINS_VERSION}"

          # Extract this version's changelog section for the dedicated release
          extract_latest() {
            awk '
              /^## / { if (found) exit; found=1; next }
              found { print }
            ' "$1"
          }

          PLUGINS_CHANGELOG=$(extract_latest skills/CHANGELOG.md)

          {
            echo "Agent skills plugin artifacts for b2c-agent-plugins v${PLUGINS_VERSION}. Download the \`*-skills.zip\` files below."
            echo ""
            echo "See the [Agent Skills & Plugins guide](https://salesforcecommercecloud.github.io/b2c-developer-tooling/guide/agent-skills.html) for installation and usage."
            echo ""
            if [ -n "$PLUGINS_CHANGELOG" ]; then
              echo "### Changelog"
              echo ""
              echo "$PLUGINS_CHANGELOG"
            fi
          } > /tmp/plugins-release-notes.md

          # Idempotent on re-runs: reuse an existing release rather than failing
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists, uploading artifacts to it"
          else
            gh release create "$RELEASE_TAG" \
              --title "Agent Plugins ${PLUGINS_VERSION}" \
              --latest=false \
              --notes-file /tmp/plugins-release-notes.md
          fi

          gh release upload "$RELEASE_TAG" ${{ steps.package-skills.outputs.zips }} --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PLUGINS_VERSION: ${{ steps.packages.outputs.version_plugins }}

      - name: Create VS Code extension release
        if: >-
          steps.release-type.outputs.type == 'stable'
          && steps.packages.outputs.publish_vsx == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Release/tag identity is the changeset semver; the VSIX file itself is
          # named for the marketplace stable version (1.2.0), which differs. Bind
          # both (and the attested filename) as env vars — no shell interpolation.
          VSX_SEMVER: ${{ steps.packages.outputs.version_vsx }}
          VSIX_FILE: ${{ steps.vsix-hash.outputs.vsix_file }}
        run: |
          set -euo pipefail
          VSX_TAG="b2c-vs-extension@${VSX_SEMVER}"
          # Upload the exact file that was hashed + attested above (not a glob).
          VSIX_PATH="packages/b2c-vs-extension/${VSIX_FILE}"

          # Extract extension changelog for the dedicated release
          extract_latest() {
            awk '
              /^## / { if (found) exit; found=1; next }
              found { print }
            ' "$1"
          }

          VSX_CHANGELOG=$(extract_latest packages/b2c-vs-extension/CHANGELOG.md)

          # Install line references the ACTUAL attested filename (marketplace
          # version), not the changeset semver, so the copy-paste works.
          sed 's/^          //' > /tmp/vsx-release-notes.md <<HEADER
          ## B2C DX VS Code Extension ${VSX_SEMVER}

          Download the \`${VSIX_FILE}\` file below and install via:
          \`\`\`
          code --install-extension ${VSIX_FILE}
          \`\`\`

          Or in VS Code: Extensions → ⋯ → Install from VSIX...

          ---

          ### Changelog

          HEADER
          printf '%s\n' "$VSX_CHANGELOG" >> /tmp/vsx-release-notes.md

          # Create a dedicated release for the extension (not latest — main releases own that)
          # Use --clobber on upload in case a previous run partially completed
          if gh release view "$VSX_TAG" >/dev/null 2>&1; then
            echo "Release $VSX_TAG already exists, uploading VSIX to it"
            gh release upload "$VSX_TAG" "$VSIX_PATH" --clobber
          else
            gh release create "$VSX_TAG" \
              --title "VS Code Extension ${VSX_SEMVER}" \
              --latest=false \
              --notes-file /tmp/vsx-release-notes.md

            gh release upload "$VSX_TAG" "$VSIX_PATH"
          fi

      # NOTE: This monorepo BUILDS + ATTESTS the VSIX and publishes it as a public
      # GitHub release (above). Cross-repo delivery to forcedotcom/b2c-dx is PULL-based
      # and lives entirely in b2c-dx: it polls this repo's public releases with its own
      # GITHUB_TOKEN, re-verifies sha256 + SLSA build provenance, and opens its own
      # release PR. The monorepo therefore holds NO cross-repo credential and fires no
      # dispatch — the SLSA attestation is the trust anchor, not a push from here.

      - name: Trigger documentation deployment
        if: >-
          steps.release-type.outputs.type == 'stable' && steps.changesets.outputs.skip != 'true' && steps.quick-check.outputs.skip != 'true'
          && (steps.packages.outputs.tag_cli == 'latest' || steps.packages.outputs.tag_sdk == 'latest' || steps.packages.outputs.tag_mcp == 'latest' || steps.packages.outputs.publish_docs == 'true')
        run: gh workflow run deploy-docs.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Only stable (release/** workflow_run) commits version bumps that need
      # merging back to main. Beta also arrives via workflow_run (on develop) but
      # is a --snapshot preview that commits nothing, so it must NOT open a
      # develop -> main bump PR.
      - name: Create PR to merge version bumps back to main
        if: steps.release-type.outputs.type == 'stable' && github.event_name == 'workflow_run'
        run: |
          if [[ "${{ steps.packages.outputs.publish_sdk }}" == "true" ]] || \
             [[ "${{ steps.packages.outputs.publish_cli }}" == "true" ]] || \
             [[ "${{ steps.packages.outputs.publish_mcp }}" == "true" ]] || \
             [[ "${{ steps.packages.outputs.publish_mrt }}" == "true" ]] || \
             [[ "${{ steps.packages.outputs.publish_docs }}" == "true" ]]; then
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            gh pr create --base main --head "$BRANCH" \
              --title "Merge version bumps from ${BRANCH}" \
              --body "$(cat <<'EOF'
          Auto-created after release branch publish from `'"${BRANCH}"'`.

          Merges version bump commits back to main to prevent version collisions on the next regular release.

          **Review checklist:**
          - [ ] Version bumps in package.json files look correct
          - [ ] CHANGELOG entries are accurate
          - [ ] No merge conflicts with pending changesets on main
          EOF
          )" || echo "::warning::PR already exists or could not be created"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail if any publish failed
        if: always() && (steps.publish-sdk.outcome == 'failure' || steps.publish-cli.outcome == 'failure' || steps.publish-mcp.outcome == 'failure' || steps.publish-mrt.outcome == 'failure')
        run: |
          echo "::error::One or more npm publishes failed:"
          [[ "${{ steps.publish-sdk.outcome }}" == "failure" ]] && echo "  - SDK"
          [[ "${{ steps.publish-cli.outcome }}" == "failure" ]] && echo "  - CLI"
          [[ "${{ steps.publish-mcp.outcome }}" == "failure" ]] && echo "  - MCP"
          [[ "${{ steps.publish-mrt.outcome }}" == "failure" ]] && echo "  - MRT"
          exit 1

  # Environment-gated npm publish for rc (approval #1). The `publish` job above
  # ran automatically: it built + attested BOTH VSIX and cut the ONE prerelease
  # release, but published NOTHING to npm for rc. This job holds the manual gate:
  # a maintainer approves the `publish` environment, then the rc npm push runs.
  # It rebuilds deterministically from the SAME commit (the build-once bytes are
  # provenance-anchored via the release; npm re-derives its own provenance) and
  # publishes each changed package's REAL target version under the 'rc' dist-tag.
  # Promotion (promote.yml) later moves that tag rc -> latest — no republish.
  publish-npm-rc:
    name: Publish rc to npm (gated)
    needs: publish
    if: >-
      needs.publish.outputs.release_type == 'rc' &&
      (needs.publish.outputs.publish_sdk == 'true' ||
       needs.publish.outputs.publish_cli == 'true' ||
       needs.publish.outputs.publish_mcp == 'true' ||
       needs.publish.outputs.publish_mrt == 'true')
    runs-on: ubuntu-latest
    # The protected environment is the human gate: a required reviewer must
    # approve before this job (and therefore the npm publish) runs.
    environment: publish
    permissions:
      contents: write # create npm version git tags
      id-token: write # npm OIDC trusted publishing + --provenance
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Build from the exact commit the publish job attested from. For the
          # rc dispatch (from changesets.yml on main) this is main's HEAD; the
          # committed package.json already carries the real target versions.
          ref: ${{ github.sha }}
          fetch-depth: 0 # for git tag existence checks + push

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24.18.0'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        # Same pin rationale as the publish job: >=11.5.1 for OIDC, not npm@latest.
        run: npm install -g npm@11.16.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Run tests
        run: pnpm --filter '!b2c-vs-extension' run test

      # Publish each changed package's committed (real) version under the 'rc'
      # dist-tag. continue-on-error mirrors the stable path so one package's
      # failure doesn't strand the others; the final step fails the job if any did.
      - name: Publish SDK to npm (rc)
        if: needs.publish.outputs.publish_sdk == 'true'
        id: publish-sdk
        continue-on-error: true
        run: pnpm --filter @salesforce/b2c-tooling-sdk publish --provenance --no-git-checks --tag rc

      - name: Publish CLI to npm (rc)
        if: needs.publish.outputs.publish_cli == 'true'
        id: publish-cli
        continue-on-error: true
        run: pnpm --filter @salesforce/b2c-cli publish --provenance --no-git-checks --tag rc

      - name: Publish MCP to npm (rc)
        if: needs.publish.outputs.publish_mcp == 'true'
        id: publish-mcp
        continue-on-error: true
        run: pnpm --filter @salesforce/b2c-dx-mcp publish --provenance --no-git-checks --tag rc

      - name: Publish MRT Utilities to npm (rc)
        if: needs.publish.outputs.publish_mrt == 'true'
        id: publish-mrt
        continue-on-error: true
        run: pnpm --filter @salesforce/mrt-utilities publish --provenance --no-git-checks --tag rc

      # Tag the commit with each published npm version (idempotent). These mark
      # "this version is on npm" — created now because rc is the run that pushes
      # the real version; promotion only moves the dist-tag, it never republishes.
      - name: Create npm version git tags
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAGS_CREATED=""
          create_tag() {
            local tag="$1"
            if git rev-parse -q --verify "refs/tags/$tag" >/dev/null || \
               git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
              echo "Tag already exists, skipping: $tag"
              return
            fi
            git tag "$tag"
            TAGS_CREATED="$TAGS_CREATED $tag"
          }
          [[ "${{ needs.publish.outputs.publish_sdk }}" == "true" ]] && create_tag "@salesforce/b2c-tooling-sdk@$(node -p "require('./packages/b2c-tooling-sdk/package.json').version")"
          [[ "${{ needs.publish.outputs.publish_cli }}" == "true" ]] && create_tag "@salesforce/b2c-cli@$(node -p "require('./packages/b2c-cli/package.json').version")"
          [[ "${{ needs.publish.outputs.publish_mcp }}" == "true" ]] && create_tag "@salesforce/b2c-dx-mcp@$(node -p "require('./packages/b2c-dx-mcp/package.json').version")"
          [[ "${{ needs.publish.outputs.publish_mrt }}" == "true" ]] && create_tag "@salesforce/mrt-utilities@$(node -p "require('./packages/mrt-utilities/package.json').version")"
          if [ -n "$TAGS_CREATED" ]; then
            git push origin $TAGS_CREATED
            echo "Created tags:$TAGS_CREATED"
          else
            echo "No tags to create"
          fi

      - name: Fail if any publish failed
        if: always() && (steps.publish-sdk.outcome == 'failure' || steps.publish-cli.outcome == 'failure' || steps.publish-mcp.outcome == 'failure' || steps.publish-mrt.outcome == 'failure')
        run: |
          echo "::error::One or more rc npm publishes failed:"
          [[ "${{ steps.publish-sdk.outcome }}" == "failure" ]] && echo "  - SDK"
          [[ "${{ steps.publish-cli.outcome }}" == "failure" ]] && echo "  - CLI"
          [[ "${{ steps.publish-mcp.outcome }}" == "failure" ]] && echo "  - MCP"
          [[ "${{ steps.publish-mrt.outcome }}" == "failure" ]] && echo "  - MRT"
          exit 1
