name: Guides Link Check

# Guide docs are fetched live from developer.salesforce.com, so a stale index can
# accumulate dead 404 links. This job link-checks every URL in the bundled guides
# index — but only when that index (or the checker) changes, so normal PRs don't
# pay the network cost and the docs host isn't hit on every build.
on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'packages/b2c-tooling-sdk/data/guides/index.json'
      - 'packages/b2c-tooling-sdk/scripts/check-guides-links.ts'
      - '.github/workflows/guides-link-check.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'packages/b2c-tooling-sdk/data/guides/index.json'
      - 'packages/b2c-tooling-sdk/scripts/check-guides-links.ts'
      - '.github/workflows/guides-link-check.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check guide links
        working-directory: packages/b2c-tooling-sdk
        run: pnpm run check:guides-links
