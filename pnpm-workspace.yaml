  - yarn

# Security overrides: pin vulnerable transitive dependencies to patched releases.
# Keep ALL overrides here (NOT in package.json's pnpm.overrides) — pnpm honors only
# one location and package.json wins, silently disabling this block if both exist.
# Each value is capped to the existing major (e.g. '>=1.2.3 <2') to avoid breaking bumps.
#
# Accepted (not overridden): uuid@8.3.2 (GHSA-w5hq-g745-h8pq, moderate) reaches the tree
# via applicationinsights > @azure/functions, which declares uuid ^8.3.0. @azure/functions
# is a TYPE-ONLY import in applicationinsights 3.x — verified it is never require()'d at
# runtime (0 modules loaded), so the vulnerable code path is unreachable in the SDK/CLI/MCP.
# Forcing uuid >=11 would violate @azure/functions's declared range for no runtime benefit.
overrides:
  '@hono/node-server@<1.19.10': '>=1.19.10 <2'
  '@isaacs/brace-expansion@<=5.0.0': '>=5.0.1'
  '@smithy/types': 4.14.3
  'brace-expansion@>=1.0.0 <1.1.13': '>=1.1.13 <2'
  'brace-expansion@>=2.0.0 <2.0.3': '>=2.0.3 <3'
  'brace-expansion@>=5.0.0 <5.0.6': '>=5.0.6 <6'
  baseline-browser-mapping: '>=2.9.19'
  diff@>=4.0.0 <4.0.4: '>=4.0.4'
  diff@>=5.0.0 <5.2.2: '>=5.2.2'
  esbuild@<=0.24.2: '>=0.25.0'
  express-rate-limit@>=8.2.0 <8.2.2: '>=8.2.2 <9'
  fast-uri@<=3.1.1: '>=3.1.2 <4'
  fast-xml-parser@>=4.3.6 <5.5.6: '>=5.5.6 <6'
  flatted@<3.4.2: '>=3.4.2 <4'
  form-data@>=4.0.0 <4.0.6: '>=4.0.6 <5'
  hono@<4.12.25: '>=4.12.25 <5'
  http-proxy-middleware@>=3.0.4 <3.0.7: '>=3.0.7 <4'
  js-yaml@>=4.0.0 <4.1.1: '>=4.1.1'
  lodash@>=4.0.0 <4.18.0: '>=4.18.0 <5'
  mdast-util-to-hast@>=13.0.0 <13.2.1: '>=13.2.1'
  minimatch@>=3.0.0 <3.1.4: '>=3.1.4 <4'
  minimatch@>=5.0.0 <5.1.8: '>=5.1.8 <6'
  minimatch@>=9.0.0 <9.0.7: '>=9.0.7 <10'
  minimatch@>=10.0.0 <10.2.3: '>=10.2.3 <11'
  path-to-regexp@<0.1.13: '>=0.1.13 <0.2'
  path-to-regexp@>=8.0.0 <8.4.0: '>=8.4.0 <9'
  preact@>=10.27.0 <10.27.3: '>=10.27.3'
  picomatch@>=2.0.0 <3.0.0: 2.3.2
  picomatch@>=4.0.0 <4.0.4: 4.0.4
  '@opentelemetry/core@>=2.0.0 <2.8.0': '>=2.8.0 <3'
  protobufjs@>=7.0.0 <7.6.1: '>=7.6.1 <8'
  protobufjs@>=8.0.0 <8.6.0: '>=8.6.0 <9'
  qs@<6.14.2: '>=6.15.2'
  rollup@>=4.0.0 <4.59.0: '>=4.59.0 <5'
  serialize-javascript@<7.0.3: '>=7.0.3 <8'
  shell-quote@<=1.8.3: '>=1.8.4 <2'
  tmp@<0.2.6: '>=0.2.6 <0.3'
  underscore@<=1.13.7: '>=1.13.8 <2'
  undici@>=7.0.0 <7.24.0: '>=7.24.0 <8'
  vite@>=7.0.0 <7.3.5: '>=7.3.5 <8'
  ws@>=8.0.0 <8.21.0: '>=8.21.0 <9'

