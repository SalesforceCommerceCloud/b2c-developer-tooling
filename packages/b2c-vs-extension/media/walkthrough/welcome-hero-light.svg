<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1180" role="img" aria-labelledby="hero-title-light hero-desc-light" preserveAspectRatio="xMidYMid meet">
  <title id="hero-title-light">Pick your starting role</title>
  <desc id="hero-desc-light">Welcome to B2C DX. Choose one of four roles — Storefront, API/Integration, DevOps/Release, or AI-augmented — to tailor your onboarding path. Each role lists its step count and average completion time.</desc>
  <defs>
    <linearGradient id="plate-base-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F2F7FC"/>
    </linearGradient>
    <linearGradient id="plate-wash-l" x1="0" y1="0" x2="0.3" y2="0.6">
      <stop offset="0%"   stop-color="#0176D3" stop-opacity="0.13"/>
      <stop offset="55%"  stop-color="#1B96FF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="halo-l" cx="0.16" cy="0.18" r="0.50">
      <stop offset="0%"   stop-color="#1B96FF" stop-opacity="0.20"/>
      <stop offset="60%"  stop-color="#1B96FF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#1B96FF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="role-icon-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B96FF"/>
      <stop offset="100%" stop-color="#0176D3"/>
    </linearGradient>
    <linearGradient id="role-icon-green-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2FA86A"/>
      <stop offset="100%" stop-color="#1A8754"/>
    </linearGradient>

    <linearGradient id="role-card-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FBFD"/>
    </linearGradient>
    <linearGradient id="cta-l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0176D3"/>
      <stop offset="100%" stop-color="#014486"/>
    </linearGradient>

    <filter id="card-shadow-l" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="6"  flood-color="#0176D3" flood-opacity="0.10"/>
      <feDropShadow dx="0" dy="10" stdDeviation="22" flood-color="#0176D3" flood-opacity="0.06"/>
    </filter>
    <filter id="icon-shadow-l" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0176D3" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Plate -->
  <rect width="1000" height="1180" rx="24" fill="url(#plate-base-l)"/>
  <rect width="1000" height="1180" rx="24" fill="url(#plate-wash-l)"/>
  <ellipse cx="160" cy="200" rx="500" ry="320" fill="url(#halo-l)"/>

  <!-- Subtle decorative quarter-arc, top-right (replaces the duplicate brand pill) -->
  <g transform="translate(880, 60)" stroke="#0176D3" stroke-opacity="0.18" fill="none">
    <circle cx="0" cy="0" r="80" stroke-width="1"/>
    <circle cx="0" cy="0" r="62" stroke-width="1" stroke-dasharray="2 6"/>
    <circle cx="0" cy="0" r="44" stroke-width="1"/>
  </g>

  <!-- Phase indicator chip (top-right) — gives "where am I" instead of repeating the brand -->
  <g transform="translate(820, 60)">
    <rect x="0" y="0" width="120" height="32" rx="16" fill="#FFFFFF" stroke="#0176D3" stroke-opacity="0.25" stroke-width="1"/>
    <circle cx="14" cy="16" r="3.5" fill="#1A8754"/>
    <text x="26" y="21"
          font-family="'Inter','Segoe UI',system-ui,-apple-system,sans-serif"
          font-size="11.5" font-weight="700" letter-spacing="2" fill="#032D60">PHASE 0 / 5</text>
  </g>

  <!-- Eyebrow -->
  <text x="500" y="174" text-anchor="middle"
        font-family="'Inter','Segoe UI',system-ui,-apple-system,sans-serif"
        font-size="13" font-weight="700" letter-spacing="6" fill="#0176D3" opacity="0.92">
    WELCOME · TAILOR YOUR PATH
  </text>

  <!-- Massive headline -->
  <text x="500" y="270" text-anchor="middle"
        font-family="'Inter','SF Pro Display','Segoe UI Variable Display','Segoe UI',system-ui,-apple-system,sans-serif"
        font-size="72" font-weight="800" letter-spacing="-3.5" fill="#032D60">
    Pick your starting role.
  </text>

  <!-- Subhead -->
  <text x="500" y="320" text-anchor="middle"
        font-family="'Inter','Segoe UI',system-ui,-apple-system,sans-serif"
        font-size="18" font-weight="500" fill="#586876">
    Different roles need different things first. Choose one for a tailored deep-dive,
  </text>
  <text x="500" y="346" text-anchor="middle"
        font-family="'Inter','Segoe UI',system-ui,-apple-system,sans-serif"
        font-size="18" font-weight="500" fill="#586876">
    or follow the universal five-phase flow shown on the left.
  </text>

  <!-- Stat strip — enterprise trust signal -->
  <g transform="translate(160, 396)">
    <line x1="0" y1="0" x2="680" y2="0" stroke="#0176D3" stroke-opacity="0.15"/>
    <g transform="translate(85, 46)">
      <text text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="28" font-weight="800" letter-spacing="-1" fill="#032D60">4</text>
      <text x="0" y="22" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#586876">ROLES</text>
    </g>
    <line x1="170" y1="20" x2="170" y2="86" stroke="#0176D3" stroke-opacity="0.15"/>
    <g transform="translate(255, 46)">
      <text text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="28" font-weight="800" letter-spacing="-1" fill="#032D60">5</text>
      <text x="0" y="22" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#586876">PHASES</text>
    </g>
    <line x1="340" y1="20" x2="340" y2="86" stroke="#0176D3" stroke-opacity="0.15"/>
    <g transform="translate(430, 46)">
      <text text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="28" font-weight="800" letter-spacing="-1" fill="#032D60">~10<tspan font-size="14" font-weight="700" fill="#586876"> MIN</tspan></text>
      <text x="0" y="22" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#586876">AVG TIME</text>
    </g>
    <line x1="520" y1="20" x2="520" y2="86" stroke="#0176D3" stroke-opacity="0.15"/>
    <g transform="translate(600, 46)">
      <text text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="28" font-weight="800" letter-spacing="-1" fill="#1A8754">✓</text>
      <text x="0" y="22" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#586876">DOC-BACKED</text>
    </g>
    <line x1="0" y1="100" x2="680" y2="100" stroke="#0176D3" stroke-opacity="0.15"/>
  </g>

  <!-- ─── Role cards (2 × 2) ──────────────────────────────── -->
  <!-- 1 · Storefront -->
  <g transform="translate(60, 530)" filter="url(#card-shadow-l)">
    <rect width="430" height="208" rx="18" fill="url(#role-card-l)" stroke="#0176D3" stroke-opacity="0.18" stroke-width="1"/>
    <g transform="translate(28, 28)">
      <rect width="56" height="56" rx="14" fill="url(#role-icon-l)" filter="url(#icon-shadow-l)"/>
      <g transform="translate(14, 16)" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <rect x="0" y="0" width="28" height="22" rx="2.5"/>
        <line x1="0" y1="20" x2="28" y2="6"/>
        <circle cx="3.5" cy="3" r="0.9" fill="#fff" stroke="none"/>
        <circle cx="6.5" cy="3" r="0.9" fill="#fff" stroke="none"/>
      </g>
    </g>
    <text x="104" y="50"  font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="20" font-weight="700" fill="#032D60">Storefront developer</text>
    <text x="104" y="76"  font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" font-weight="500" fill="#0176D3">SFRA · PWA Kit · ISML</text>
    <text x="28"  y="124" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" fill="#586876">Cartridge authoring, fast iteration with Code Sync,</text>
    <text x="28"  y="144" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" fill="#586876">and the WebDAV browser.</text>
    <text x="28"  y="180" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" letter-spacing="1" fill="#1A8754">8 PHASES · ~8 MIN</text>
    <!-- arrow affordance -->
    <g transform="translate(390, 172)" stroke="#0176D3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="0" y1="8" x2="14" y2="8"/>
      <polyline points="9 3 14 8 9 13"/>
    </g>
  </g>

  <!-- 2 · API / Integration -->
  <g transform="translate(510, 530)" filter="url(#card-shadow-l)">
    <rect width="430" height="208" rx="18" fill="url(#role-card-l)" stroke="#0176D3" stroke-opacity="0.18" stroke-width="1"/>
    <g transform="translate(28, 28)">
      <rect width="56" height="56" rx="14" fill="url(#role-icon-l)" filter="url(#icon-shadow-l)"/>
      <g transform="translate(14, 14)" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <path d="M11 0 C 7 0 6 2 6 6 V 11 C 6 14 4 14 0 14 C 4 14 6 14 6 17 V 22 C 6 26 7 28 11 28"/>
        <path d="M17 0 C 21 0 22 2 22 6 V 11 C 22 14 24 14 28 14 C 24 14 22 14 22 17 V 22 C 22 26 21 28 17 28"/>
      </g>
    </g>
    <text x="104" y="50"  font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="20" font-weight="700" fill="#032D60">API / integration developer</text>
    <text x="104" y="76"  font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" font-weight="500" fill="#0176D3">SCAPI · OCAPI · jobs · hooks</text>
    <text x="28"  y="124" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" fill="#586876">OAuth setup and the API Browser front-and-center.</text>
    <text x="28"  y="144" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" fill="#586876">Code Sync optional.</text>
    <text x="28"  y="180" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" letter-spacing="1" fill="#1A8754">8 PHASES · ~10 MIN</text>
    <g transform="translate(390, 172)" stroke="#0176D3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="0" y1="8" x2="14" y2="8"/>
      <polyline points="9 3 14 8 9 13"/>
    </g>
  </g>

  <!-- 3 · DevOps / Release -->
  <g transform="translate(60, 770)" filter="url(#card-shadow-l)">
    <rect width="430" height="208" rx="18" fill="url(#role-card-l)" stroke="#0176D3" stroke-opacity="0.18" stroke-width="1"/>
    <g transform="translate(28, 28)">
      <rect width="56" height="56" rx="14" fill="url(#role-icon-l)" filter="url(#icon-shadow-l)"/>
      <g transform="translate(14, 12)" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <path d="M14 0 C 18 4 22 12 22 18 L 22 26 L 14 30 L 6 26 L 6 18 C 6 12 10 4 14 0 Z"/>
        <circle cx="14" cy="14" r="3"/>
        <path d="M6 22 L 2 26 L 6 30"/>
        <path d="M22 22 L 26 26 L 22 30"/>
      </g>
    </g>
    <text x="104" y="50"  font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="20" font-weight="700" fill="#032D60">DevOps / release engineer</text>
    <text x="104" y="76"  font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" font-weight="500" fill="#0176D3">sandboxes · code versions · CAPs</text>
    <text x="28"  y="124" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" fill="#586876">OAuth + Sandbox Explorer first; less time on</text>
    <text x="28"  y="144" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" fill="#586876">cartridge authoring.</text>
    <text x="28"  y="180" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" letter-spacing="1" fill="#1A8754">7 PHASES · ~6 MIN</text>
    <g transform="translate(390, 172)" stroke="#0176D3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="0" y1="8" x2="14" y2="8"/>
      <polyline points="9 3 14 8 9 13"/>
    </g>
  </g>

  <!-- 4 · AI-augmented -->
  <g transform="translate(510, 770)" filter="url(#card-shadow-l)">
    <rect width="430" height="208" rx="18" fill="url(#role-card-l)" stroke="#0176D3" stroke-opacity="0.18" stroke-width="1"/>
    <g transform="translate(28, 28)">
      <rect width="56" height="56" rx="14" fill="url(#role-icon-green-l)" filter="url(#icon-shadow-l)"/>
      <g transform="translate(15, 15)">
        <path d="M13 0 L16.5 10 L26 13 L16.5 16 L13 26 L9.5 16 L0 13 L9.5 10 Z" fill="#fff"/>
        <circle cx="22" cy="3" r="1.6" fill="#fff"/>
        <circle cx="3" cy="22" r="1.4" fill="#fff" opacity="0.85"/>
      </g>
    </g>
    <!-- "NEW" pill on the AI card to draw attention -->
    <g transform="translate(380, 28)">
      <rect width="36" height="22" rx="11" fill="#1A8754" fill-opacity="0.12" stroke="#1A8754" stroke-opacity="0.50"/>
      <text x="18" y="15" text-anchor="middle"
            font-family="'Inter','Segoe UI',system-ui,sans-serif"
            font-size="10" font-weight="700" letter-spacing="1.2" fill="#1A8754">NEW</text>
    </g>
    <text x="104" y="50"  font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="20" font-weight="700" fill="#032D60">AI-augmented developer</text>
    <text x="104" y="76"  font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" font-weight="500" fill="#1A8754">Cursor · Claude Code · Copilot</text>
    <text x="28"  y="124" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" fill="#586876">Storefront setup plus the documented MCP server</text>
    <text x="28"  y="144" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" fill="#586876">and Agent Skills.</text>
    <text x="28"  y="180" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" letter-spacing="1" fill="#1A8754">8 PHASES · ~12 MIN</text>
    <g transform="translate(390, 172)" stroke="#1A8754" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="0" y1="8" x2="14" y2="8"/>
      <polyline points="9 3 14 8 9 13"/>
    </g>
  </g>

  <!-- Solid CTA strip — primary action surface -->
  <g transform="translate(60, 1010)">
    <rect width="880" height="92" rx="16" fill="url(#cta-l)"/>
    <text x="40" y="42"
          font-family="'Inter','Segoe UI',system-ui,sans-serif"
          font-size="17" font-weight="700" fill="#FFFFFF">
      Ready to begin?
    </text>
    <text x="40" y="66"
          font-family="'Inter','Segoe UI',system-ui,sans-serif"
          font-size="13" font-weight="500" fill="#A8C9E8">
      Click <tspan font-weight="700" fill="#FFFFFF">Open role-based guide</tspan> below to launch the deep-dive panel.
    </text>
    <!-- secondary inline link -->
    <g transform="translate(610, 29)">
      <rect width="230" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.12" stroke="#FFFFFF" stroke-opacity="0.30"/>
      <text x="115" y="22" text-anchor="middle"
            font-family="'Inter','Segoe UI',system-ui,sans-serif"
            font-size="12" font-weight="600" letter-spacing="0.5" fill="#FFFFFF">Already set up? Mark all done →</text>
    </g>
  </g>

  <!-- Bottom decorative dots -->
  <g fill="#0176D3" opacity="0.10">
    <circle cx="60"  cy="1140" r="2.5"/><circle cx="92"  cy="1140" r="2.5"/>
    <circle cx="908" cy="1140" r="2.5"/><circle cx="940" cy="1140" r="2.5"/>
  </g>
</svg>
