<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'none'; script-src 'nonce-__NONCE__'; style-src __CSP_SOURCE__; img-src __CSP_SOURCE__ data:; font-src __CSP_SOURCE__;"
  />
  <title>CIP Tables Browser</title>
  <link rel="stylesheet" href="__STYLES_URI__" />
  <style>body > :not(.page-header):not(header) { padding: 0 16px; } body > .page-header, body > header { margin-bottom: 12px; }</style>
</head>
<body>
  <header class="page-header">
    <div class="page-header__body">
      <div class="page-header__eyebrow">B2C-DX Analytics</div>
      <div class="page-header__title">Tables Browser</div>
      <div class="page-header__subtitle">Browse CIP data warehouse tables and inspect their schemas.</div>
    </div>
    <div class="page-header__meta">
      <div class="conn-bar" role="status" aria-label="CIP connection">
        <div class="conn-bar__item">
          <span id="connPill" class="conn-pill disconnected">Disconnected</span>
        </div>
        <div class="conn-bar__item" id="connTenantWrap" hidden>
          <span class="conn-bar__label">Tenant</span>
          <span class="conn-bar__value" id="connTenant"></span>
        </div>
        <div class="conn-bar__item" id="connHostWrap" hidden>
          <span class="conn-bar__label">Host</span>
          <span class="conn-bar__value" id="connHost"></span>
        </div>
      </div>
      <button type="button" class="btn btn-secondary" id="configureBtn">Configure</button>
      <button type="button" class="btn btn-primary" id="loadTablesBtn">Load Tables</button>
    </div>
  </header>
  <span id="connDetail" hidden></span>

  <div class="status-message" id="statusMessage"></div>

  <div class="search-box" id="searchBox" style="display: none;">
    <input type="text" id="searchInput" placeholder="Search tables..." />
  </div>

  <div class="tables-grid" id="tablesGrid" style="display: none;">
    <div class="tables-list" id="tablesList"></div>
    <div class="table-detail empty" id="tableDetail">
      Select a table to view its schema
    </div>
  </div>

  <script nonce="__NONCE__">
    const vscode = acquireVsCodeApi();
    let currentConnection = __CONNECTION_JSON__;

    const connPill = document.getElementById('connPill');
    const connDetail = document.getElementById('connDetail');
    const connTenantWrap = document.getElementById('connTenantWrap');
    const connTenant = document.getElementById('connTenant');
    const connHostWrap = document.getElementById('connHostWrap');
    const connHost = document.getElementById('connHost');
    const configureBtn = document.getElementById('configureBtn');
    const loadTablesBtn = document.getElementById('loadTablesBtn');
    const statusMessage = document.getElementById('statusMessage');
    const searchBox = document.getElementById('searchBox');
    const searchInput = document.getElementById('searchInput');
    const tablesGrid = document.getElementById('tablesGrid');
    const tablesList = document.getElementById('tablesList');
    const tableDetail = document.getElementById('tableDetail');

    let allTables = [];
    let selectedTable = null;

    function renderConnection() {
      const c = currentConnection || {};
      const status = c.status || 'disconnected';
      connPill.className = 'conn-pill ' + status;
      if (status === 'connected') {
        connPill.textContent = 'Connected';
      } else if (status === 'testing') {
        connPill.textContent = 'Connecting';
      } else {
        connPill.textContent = 'Disconnected';
      }
      if (c.tenantId) {
        connTenant.textContent = c.tenantId;
        connTenantWrap.hidden = false;
      } else {
        connTenantWrap.hidden = true;
      }
      if (c.host) {
        connHost.textContent = c.host;
        connHostWrap.hidden = false;
      } else {
        connHostWrap.hidden = true;
      }
      connDetail.textContent = c.message || '';
    }
    renderConnection();

    configureBtn.addEventListener('click', () => {
      vscode.postMessage({command: 'configureConnection'});
    });

    loadTablesBtn.addEventListener('click', () => {
      if (!currentConnection || !currentConnection.tenantId) {
        showStatus('error', 'Configure CIP connection first');
        vscode.postMessage({command: 'configureConnection'});
        return;
      }
      vscode.postMessage({command: 'loadTables'});
    });

    searchInput.addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      filterTables(query);
    });

    function filterTables(query) {
      const filtered = query ? allTables.filter(t => t.toLowerCase().includes(query)) : allTables;
      renderTablesList(filtered);
    }

    function showStatus(type, message) {
      statusMessage.className = 'status-message ' + type;
      statusMessage.textContent = message;
    }

    function showStatusHtml(type, html) {
      statusMessage.className = 'status-message ' + type;
      statusMessage.innerHTML = html;
    }

    function renderTablesList(tables) {
      tablesList.replaceChildren();

      if (tables.length === 0) {
        const empty = document.createElement('div');
        empty.style.padding = '12px';
        empty.style.color = 'var(--vscode-descriptionForeground)';
        empty.textContent = 'No tables found';
        tablesList.appendChild(empty);
        return;
      }

      tables.forEach(tableName => {
        const item = document.createElement('div');
        item.className = 'table-item';
        if (selectedTable === tableName) {
          item.classList.add('selected');
        }
        item.textContent = tableName;
        item.addEventListener('click', () => selectTable(tableName));
        tablesList.appendChild(item);
      });
    }

    function selectTable(tableName) {
      selectedTable = tableName;

      document.querySelectorAll('.table-item').forEach(item => {
        if (item.textContent === tableName) {
          item.classList.add('selected');
        } else {
          item.classList.remove('selected');
        }
      });

      vscode.postMessage({
        command: 'describeTable',
        params: {tableName: tableName},
      });
    }

    window.addEventListener('message', event => {
      const message = event.data;

      switch (message.command) {
        case 'connectionState':
          currentConnection = message.connection || currentConnection;
          renderConnection();
          break;

        case 'tablesLoading':
          showStatusHtml('loading', '<span class="spinner"></span> Loading tables...');
          loadTablesBtn.disabled = true;
          break;

        case 'tablesLoaded':
          allTables = message.tables || [];
          showStatus('success', 'Loaded ' + message.tableCount + ' tables.');
          loadTablesBtn.disabled = false;
          searchBox.style.display = 'block';
          tablesGrid.style.display = 'grid';
          renderTablesList(allTables);
          break;

        case 'tablesLoadError':
          showStatus('error', message.error);
          loadTablesBtn.disabled = false;
          break;

        case 'tableDescribing': {
          tableDetail.replaceChildren();
          const loading = document.createElement('div');
          loading.style.padding = '12px';
          loading.innerHTML = '<span class="spinner"></span> Loading schema...';
          tableDetail.appendChild(loading);
          tableDetail.classList.remove('empty');
          break;
        }

        case 'tableDescribed':
          renderTableSchema(message.tableName, message.schema);
          break;

        case 'tableDescribeError': {
          tableDetail.replaceChildren();
          const err = document.createElement('div');
          err.style.padding = '12px';
          err.style.color = 'var(--vscode-errorForeground)';
          err.textContent = 'Failed to load schema: ' + message.error;
          tableDetail.appendChild(err);
          tableDetail.classList.remove('empty');
          break;
        }
      }
    });

    function renderTableSchema(tableName, schema) {
      tableDetail.classList.remove('empty');
      tableDetail.replaceChildren();

      const h2 = document.createElement('h2');
      h2.textContent = tableName;
      tableDetail.appendChild(h2);

      const meta = document.createElement('p');
      meta.style.marginBottom = '12px';
      meta.style.color = 'var(--vscode-descriptionForeground)';
      meta.style.fontSize = '11px';
      meta.textContent = schema.columns.length + ' columns';
      tableDetail.appendChild(meta);

      const table = document.createElement('table');
      table.className = 'columns-table';

      const thead = document.createElement('thead');
      const headRow = document.createElement('tr');
      ['Column Name', 'Type', 'Nullable'].forEach(h => {
        const th = document.createElement('th');
        th.textContent = h;
        headRow.appendChild(th);
      });
      thead.appendChild(headRow);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      schema.columns.forEach(col => {
        const tr = document.createElement('tr');

        const nameTd = document.createElement('td');
        nameTd.style.fontFamily = 'var(--vscode-editor-font-family)';
        nameTd.textContent = col.name;
        tr.appendChild(nameTd);

        const typeTd = document.createElement('td');
        const typeBadge = document.createElement('span');
        typeBadge.className = 'type-badge';
        typeBadge.textContent = col.type;
        typeTd.appendChild(typeBadge);
        tr.appendChild(typeTd);

        const nullTd = document.createElement('td');
        nullTd.textContent = col.nullable ? 'Yes' : 'No';
        tr.appendChild(nullTd);

        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      tableDetail.appendChild(table);
    }
  </script>
</body>
</html>
