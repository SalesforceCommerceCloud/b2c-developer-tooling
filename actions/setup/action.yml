name: 'B2C CLI Setup'
description: 'Install the Salesforce B2C Commerce CLI and configure authentication environment variables'
branding:
  icon: 'terminal'
  color: 'blue'

inputs:
  version:
    description: 'CLI version to install (e.g. "latest", "0.4.1", "nightly")'
    required: false
    default: 'latest'
  skip-if-present:
    description: 'Reuse an already-installed CLI instead of installing. When true, the CLI is installed only if none is present (no version check, no upgrade). High-level actions set this so they reuse an existing install; a direct setup call leaves it false and always installs the requested version.'
    required: false
    default: 'false'
  node-version:
    description: 'Node.js version to install'
    required: false
    default: '22'
  client-id:
    description: 'OAuth Client ID → SFCC_CLIENT_ID'
    required: false
  client-secret:
    description: 'OAuth Client Secret → SFCC_CLIENT_SECRET'
    required: false
  server:
    description: 'B2C instance hostname → SFCC_SERVER'
    required: false
  code-version:
    description: 'Code version → SFCC_CODE_VERSION'
    required: false
  username:
    description: 'WebDAV username → SFCC_USERNAME'
    required: false
  password:
    description: 'WebDAV password/access key → SFCC_PASSWORD'
    required: false
  short-code:
    description: 'SCAPI short code → SFCC_SHORTCODE'
    required: false
  tenant-id:
    description: 'Tenant ID → SFCC_TENANT_ID'
    required: false
  mrt-api-key:
    description: 'MRT API key → MRT_API_KEY'
    required: false
  mrt-project:
    description: 'MRT project slug → MRT_PROJECT'
    required: false
  mrt-environment:
    description: 'MRT environment → MRT_ENVIRONMENT'
    required: false
  account-manager-host:
    description: 'Account Manager hostname → SFCC_ACCOUNT_MANAGER_HOST'
    required: false
  webdav-server:
    description: 'Separate WebDAV hostname (used for staging cert. hostnames) → SFCC_WEBDAV_SERVER'
    required: false
  certificate:
    description: 'Path to PKCS12 client certificate for two-factor (mTLS) auth → SFCC_CERTIFICATE'
    required: false
  certificate-passphrase:
    description: 'Passphrase for the PKCS12 client certificate → SFCC_CERTIFICATE_PASSPHRASE'
    required: false
  selfsigned:
    description: 'Allow self-signed server certificates → SFCC_SELFSIGNED. Set to "true" to enable; omit otherwise.'
    required: false
  log-level:
    description: 'CLI log level (trace, debug, info, warn, error, silent) → SFCC_LOG_LEVEL'
    required: false
  plugins:
    description: 'Plugins to install (one per line, npm package or GitHub owner/repo)'
    required: false

outputs:
  cli-version:
    description: 'Installed CLI version'
    value: ${{ steps.verify.outputs.cli-version }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install B2C CLI
      shell: bash
      env:
        B2C_VERSION: ${{ inputs.version }}
        B2C_SKIP_IF_PRESENT: ${{ inputs.skip-if-present }}
      run: |
        REQUESTED="${B2C_VERSION:-latest}"

        # Is a usable CLI already on PATH? (handles re-invocation within a job and
        # persistent self-hosted runners where the install survives between jobs)
        INSTALLED=""
        if command -v b2c >/dev/null 2>&1; then
          # Token anchored to the package name so it can never capture the node version
          # from "@salesforce/b2c-cli/<ver> <platform> node-v<ver>".
          INSTALLED=$(b2c --version 2>/dev/null | grep -oE '@salesforce/b2c-cli/[^[:space:]]+' | head -n1 | cut -d/ -f3 || true)
        fi

        if [ "$B2C_SKIP_IF_PRESENT" = "true" ] && [ -n "$INSTALLED" ]; then
          # "Ensure a CLI is available" mode (used by high-level actions): reuse whatever
          # is installed; never upgrade and never hit the network. This is what makes a
          # deploy/import that follows a setup step a no-op instead of a reinstall.
          echo "B2C CLI ${INSTALLED} already present; reusing it (skip-if-present)"
        else
          # Calling setup directly is an explicit request to install the requested
          # version. Install the spec directly — npm resolves tags ("latest"/"nightly")
          # and ranges itself, so no registry probe is needed, keeping the path fast and
          # free of a network call that could fail the step.
          echo "Installing @salesforce/b2c-cli@${REQUESTED} (currently: ${INSTALLED:-none})"
          npm install -g "@salesforce/b2c-cli@${REQUESTED}"
        fi

    - name: Set environment variables
      shell: bash
      run: |
        # CI defaults
        echo "NO_COLOR=1" >> "$GITHUB_ENV"

        # Auth and config — only set if provided
        if [ -n "${{ inputs.client-id }}" ]; then
          echo "SFCC_CLIENT_ID=${{ inputs.client-id }}" >> "$GITHUB_ENV"
        fi
        if [ -n "${{ inputs.client-secret }}" ]; then
          echo "SFCC_CLIENT_SECRET=${{ inputs.client-secret }}" >> "$GITHUB_ENV"
        fi
        if [ -n "${{ inputs.server }}" ]; then
          echo "SFCC_SERVER=${{ inputs.server }}" >> "$GITHUB_ENV"
        fi
        if [ -n "${{ inputs.code-version }}" ]; then
          echo "SFCC_CODE_VERSION=${{ inputs.code-version }}" >> "$GITHUB_ENV"
        fi
        if [ -n "${{ inputs.username }}" ]; then
          echo "SFCC_USERNAME=${{ inputs.username }}" >> "$GITHUB_ENV"
        fi
        if [ -n "${{ inputs.password }}" ]; then
          echo "SFCC_PASSWORD=${{ inputs.password }}" >> "$GITHUB_ENV"
        fi
        if [ -n "${{ inputs.short-code }}" ]; then
          echo "SFCC_SHORTCODE=${{ inputs.short-code }}" >> "$GITHUB_ENV"
        fi
        if [ -n "${{ inputs.tenant-id }}" ]; then
          echo "SFCC_TENANT_ID=${{ inputs.tenant-id }}" >> "$GITHUB_ENV"
        fi
        if [ -n "${{ inputs.mrt-api-key }}" ]; then
          echo "MRT_API_KEY=${{ inputs.mrt-api-key }}" >> "$GITHUB_ENV"
        fi
        if [ -n "${{ inputs.mrt-project }}" ]; then
          echo "MRT_PROJECT=${{ inputs.mrt-project }}" >> "$GITHUB_ENV"
        fi
        if [ -n "${{ inputs.mrt-environment }}" ]; then
          echo "MRT_ENVIRONMENT=${{ inputs.mrt-environment }}" >> "$GITHUB_ENV"
        fi
        if [ -n "${{ inputs.account-manager-host }}" ]; then
          echo "SFCC_ACCOUNT_MANAGER_HOST=${{ inputs.account-manager-host }}" >> "$GITHUB_ENV"
        fi
        if [ -n "${{ inputs.webdav-server }}" ]; then
          echo "SFCC_WEBDAV_SERVER=${{ inputs.webdav-server }}" >> "$GITHUB_ENV"
        fi
        if [ -n "${{ inputs.certificate }}" ]; then
          echo "SFCC_CERTIFICATE=${{ inputs.certificate }}" >> "$GITHUB_ENV"
        fi
        if [ -n "${{ inputs.certificate-passphrase }}" ]; then
          echo "SFCC_CERTIFICATE_PASSPHRASE=${{ inputs.certificate-passphrase }}" >> "$GITHUB_ENV"
        fi
        # Only export SFCC_SELFSIGNED when explicitly truthy. The SDK's env-var
        # source treats only "true"/"1" as enabling self-signed mode, but oclif
        # boolean flags map any non-empty env value to true. Skipping export for
        # other values avoids that asymmetry — leaving the flag at its default.
        if [ "${{ inputs.selfsigned }}" = "true" ] || [ "${{ inputs.selfsigned }}" = "1" ]; then
          echo "SFCC_SELFSIGNED=true" >> "$GITHUB_ENV"
        fi
        if [ -n "${{ inputs.log-level }}" ]; then
          echo "SFCC_LOG_LEVEL=${{ inputs.log-level }}" >> "$GITHUB_ENV"
        fi

    - name: Install plugins
      if: inputs.plugins != ''
      shell: bash
      env:
        B2C_PLUGINS: ${{ inputs.plugins }}
      run: |
        # Installed plugin names, one per line, exactly as the CLI records them
        # (the published package name — not the GitHub repo slug). Parsed from --json
        # with node (always present; setup-node ran first) so the match is exact.
        INSTALLED_PLUGINS=$(b2c plugins --json 2>/dev/null \
          | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{try{for(const p of JSON.parse(s))if(p&&p.name)console.log(p.name)}catch(e){}})' \
          || true)

        while IFS= read -r plugin; do
          # Trim surrounding whitespace (incl. a trailing CR from CRLF-encoded YAML)
          # with pure bash — avoids `xargs`, which aborts the step on an unbalanced
          # quote and mangles backslashes.
          plugin="${plugin#"${plugin%%[![:space:]]*}"}"
          plugin="${plugin%"${plugin##*[![:space:]]}"}"
          if [ -n "$plugin" ]; then
            # Determine the name to match against installed plugins. npm specs (scoped
            # "@scope/name" or bare "name") are recorded verbatim. For a GitHub
            # "owner/repo" spec the published package name is unknown ahead of time, so
            # fall back to the repo basename — which equals the package name for the
            # common case. Exact, fixed-string line match (grep -Fxq) avoids both
            # substring false-positives and regex-metacharacter surprises.
            spec="${plugin%/}"          # drop a trailing slash before deriving the name
            if [ "${spec:0:1}" = "@" ] || [ "${spec%/*}" = "$spec" ]; then
              name="$spec"              # scoped npm name, or bare npm name (no slash)
            else
              name="${spec##*/}"        # GitHub owner/repo -> repo basename
            fi
            # Only skip on a real, non-empty exact match; an empty name must never
            # match the (possibly empty) installed list and silently skip the install.
            if [ -n "$name" ] && printf '%s\n' "$INSTALLED_PLUGINS" | grep -Fxq "$name"; then
              echo "Plugin already installed: $plugin"
            else
              echo "Installing plugin: $plugin"
              b2c plugins install "$plugin"
            fi
          fi
        done <<< "$B2C_PLUGINS"

    - name: Verify installation
      id: verify
      shell: bash
      run: |
        CLI_VERSION=$(b2c --version)
        echo "cli-version=$CLI_VERSION" >> "$GITHUB_OUTPUT"
        echo "B2C CLI installed: $CLI_VERSION"
